<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LPL 4-Zone Base Layout</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #f7f1ed; }
  .screen {
    width: 100vw;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    padding: 12px;
    font-family: Arial, sans-serif;
  }
  .zone {
    background: #000000;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .zlbl {
    color: rgba(255,255,255,0.25);
    font-size: 14px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="screen">
    <div class="zone"><span class="zlbl">Zone 1</span></div>
    <div class="zone"><span class="zlbl">Zone 2</span></div>
    <div class="zone"><span class="zlbl">Zone 3</span></div>
    <div class="zone"><span class="zlbl">Zone 4</span></div>
  </div>
</body>
</html>
